apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: infra-me
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: infra-me
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
  ports:
    - name: web
      port: 80
      targetPort: web
      nodePort: 32080
    - name: dashboard
      port: 8080
      targetPort: dashboard
      nodePort: 32081
