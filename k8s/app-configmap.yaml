apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: infra-me
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: infra-me
data:
  SPRING_PROFILES_ACTIVE: "docker"
  PORT: "3000"
  DB_HOST: "mariadb"
  DB_PORT: "3306"
  DB_NAME: "app"
  DB_USER: "app"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  SPRING_MAIL_PORT: "587"
  SPRING_MAIL_STARTTLS_ENABLE: "true"
  OPENAI_MODEL: "gpt-4.1-mini"
  APP_STARTUP_CATCHUP_ENABLED: "true"
