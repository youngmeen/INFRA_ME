services:
  app:
    image: infra-me-app:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: infra-me-app
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      DB_URL: ${DB_URL:-jdbc:sqlite:/data/news.db}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "3000:3000"
    volumes:
      - ../data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v3.0
    container_name: infra-me-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--ping=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/ping"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 15s
    depends_on:
      app:
        condition: service_healthy

  portainer:
    image: portainer/portainer-ce:latest
    container_name: infra-me-portainer
    restart: unless-stopped
    command: ["-H", "unix:///var/run/docker.sock"]
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 30s

volumes:
  portainer_data:
