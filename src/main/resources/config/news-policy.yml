app:
  news:
    cron: "0 0 9 * * *"
    zone: "Asia/Seoul"
    weekly-cron: "0 0 9 * * MON"
    weekly-zone: "Asia/Seoul"

    daily-limit: 16
    weekly-top: 10
    per-category-daily: 1
    digest-top-news: 2
    digest-total: 6

    rss-timeout-ms: 8000
    hacker-news-enabled: true
    hacker-news-daily-max: 2

    market-enabled: true
    macro-enabled: true
    max-market-items: 2
    max-macro-items: 2
    english-market-penalty: 1.6
    minimum-korean-market-ratio: 0.7

    dedupe:
      title-similarity-threshold: 0.88

    important-keywords:
      - OpenAI
      - LLM
      - GPT
      - Java
      - Spring
      - Docker
